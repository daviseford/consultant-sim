<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Consultant Simulator - Built with Phaser/ES6</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="HandheldFriendly" content="True">
    <meta name="MobileOptimized" content="320">
    <meta http-equiv="cleartype" content="on">
    <meta name="theme-color" content="#24211f">
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #24211f;
            overscroll-behavior: none;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
        }

        #game-shell {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        #content {
            position: absolute;
            top: env(safe-area-inset-top);
            right: env(safe-area-inset-right);
            bottom: env(safe-area-inset-bottom);
            left: env(safe-area-inset-left);
        }

        #content canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .touch-controls {
            display: none;
        }

        @media (any-pointer: coarse), (max-width: 900px) {
            .touch-controls {
                position: absolute;
                inset: 0;
                z-index: 2;
                display: flex;
                align-items: flex-end;
                justify-content: space-between;
                padding:
                    0
                    max(16px, env(safe-area-inset-right))
                    max(16px, env(safe-area-inset-bottom))
                    max(16px, env(safe-area-inset-left));
                pointer-events: none;
            }

            .touch-controls__cluster {
                display: flex;
                gap: clamp(10px, 3vw, 18px);
                pointer-events: none;
            }

            .touch-controls__cluster--actions {
                flex-direction: column;
            }

            .touch-controls__button {
                width: clamp(58px, 15vw, 76px);
                min-width: 58px;
                aspect-ratio: 1;
                border: 2px solid rgba(237, 238, 201, 0.8);
                border-radius: 50%;
                color: #f5f0d5;
                background: rgba(36, 33, 31, 0.72);
                box-shadow: 0 4px 0 rgba(0, 0, 0, 0.35);
                font: 700 clamp(24px, 7vw, 34px)/1 Arial, sans-serif;
                pointer-events: auto;
                touch-action: none;
                -webkit-tap-highlight-color: transparent;
                user-select: none;
            }

            .touch-controls__button:focus-visible {
                outline: 3px solid #77BFA3;
                outline-offset: 3px;
            }

            .touch-controls__button.is-active {
                transform: translateY(3px);
                color: #24211f;
                background: #77BFA3;
                box-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
            }

            .touch-controls.is-hidden {
                display: none;
            }
        }
    </style>
</head>

<body>

    <main id="game-shell" aria-label="Consultant Simulator">
      <div id="content"></div>
      <div id="touch-controls" class="touch-controls" aria-label="Game controls">
        <div class="touch-controls__cluster" role="group" aria-label="Move">
          <button class="touch-controls__button" type="button" data-control="left" aria-label="Move left">&#9664;</button>
          <button class="touch-controls__button" type="button" data-control="right" aria-label="Move right">&#9654;</button>
        </div>
        <div class="touch-controls__cluster touch-controls__cluster--actions" role="group" aria-label="Jump and drop">
          <button class="touch-controls__button" type="button" data-control="up" aria-label="Jump">&#9650;</button>
          <button class="touch-controls__button" type="button" data-control="down" aria-label="Drop">&#9660;</button>
        </div>
      </div>
    </main>
    <script src="dist/vendor.bundle.js"></script>
    <script src="dist/bundle.js"></script>

    <!-- Google Analytics -->
    <script>
      (function (i, s, o, g, r, a, m) {
        i['GoogleAnalyticsObject'] = r;
        i[r] = i[r] || function () {
              (i[r].q = i[r].q || []).push(arguments)
            }, i[r].l = 1 * new Date();
        a = s.createElement(o),
            m = s.getElementsByTagName(o)[0];
        a.async = 1;
        a.src = g;
        m.parentNode.insertBefore(a, m)
      })(window, document, 'script', '//www.google-analytics.com/analytics.js', 'ga');

      ga('create', 'UA-55820654-2', 'auto');
      ga('require', 'linkid', 'linkid.js');
      ga('send', 'pageview');
    </script>


</body>

</html>
